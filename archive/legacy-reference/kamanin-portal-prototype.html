<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAMANIN — Project Experience</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════ */
:root {
  /* Surface */
  --bg: #FAFAF9;
  --surface: #FFFFFF;
  --surface-hover: #F5F5F4;
  --surface-active: #EFEDEB;
  --surface-elevated: #FFFFFF;
  --sidebar-bg: #1A1247;
  --sidebar-hover: #2B1878;
  --sidebar-active: #3A2888;

  /* Text */
  --text-primary: #333333;
  --text-secondary: #555555;
  --text-tertiary: #999999;
  --text-inverse: #FAFAF9;
  --text-sidebar: #A8A0C4;
  --text-sidebar-active: #FFFFFF;

  /* Accent (Brand Indigo) */
  --accent: #2B1878;
  --accent-light: #EEEAFF;
  --accent-hover: #1F1059;

  /* Brand CTA (Orange) */
  --cta: #FF8730;
  --cta-hover: #E6751A;
  --cta-light: #FFF3E8;

  /* Status */
  --committed: #16A34A;
  --committed-bg: #F0FDF4;
  --awaiting: #EA580C;
  --awaiting-bg: #FFF7ED;
  --upcoming: #9CA3AF;
  --upcoming-bg: #F9FAFB;

  /* Phase Colors */
  --phase-1: #7C3AED;
  --phase-1-light: #F5F3FF;
  --phase-1-mid: #EDE9FE;
  --phase-1-text: #6D28D9;

  --phase-2: #2563EB;
  --phase-2-light: #EFF6FF;
  --phase-2-mid: #DBEAFE;
  --phase-2-text: #1D4ED8;

  --phase-3: #D97706;
  --phase-3-light: #FFFBEB;
  --phase-3-mid: #FEF3C7;
  --phase-3-text: #B45309;

  --phase-4: #059669;
  --phase-4-light: #ECFDF5;
  --phase-4-mid: #D1FAE5;
  --phase-4-text: #047857;

  /* Border */
  --border: #E5E5E5;
  --border-light: #F0F0F0;

  /* Radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-xl: 0 8px 40px rgba(0,0,0,0.12);

  /* Spacing */
  --sp-xs: 4px;
  --sp-sm: 8px;
  --sp-md: 12px;
  --sp-lg: 16px;
  --sp-xl: 24px;
  --sp-2xl: 32px;
  --sp-3xl: 48px;

  /* Layout */
  --sidebar-w: 260px;
  --sidebar-collapsed-w: 56px;
  --bottomnav-h: 64px;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text-primary);
  background: var(--bg);
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; font-size: inherit; }
input, textarea { font-family: inherit; font-size: inherit; }

/* ═══════════════════════════════════════════
   TYPOGRAPHY
   ═══════════════════════════════════════════ */
.mono { font-family: 'DM Mono', monospace; }
.text-xs { font-size: 0.72rem; }
.text-sm { font-size: 0.8rem; }
.text-base { font-size: 1rem; }
.text-lg { font-size: 1.13rem; }
.text-xl { font-size: 1.33rem; }
.text-2xl { font-size: 1.6rem; }
.fw-400 { font-weight: 400; }
.fw-500 { font-weight: 500; }
.fw-600 { font-weight: 600; }
.fw-700 { font-weight: 700; }
.text-secondary { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }

/* ═══════════════════════════════════════════
   LAYOUT: SHELL
   ═══════════════════════════════════════════ */
.app-shell {
  display: flex;
  min-height: 100vh;
}

/* ═══════════════════════════════════════════
   SIDEBAR — Hover-expand (Aceternity pattern)
   ═══════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-collapsed-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden;
}
.sidebar:hover,
.sidebar.open {
  width: var(--sidebar-w);
}

/* Hide text labels when collapsed — reveal on expand */
.sidebar .sidebar-label {
  opacity: 0;
  white-space: nowrap;
  transition: opacity 0.18s ease 0s;
  pointer-events: none;
}
.sidebar:hover .sidebar-label,
.sidebar.open .sidebar-label {
  opacity: 1;
  pointer-events: auto;
  transition-delay: 0.08s;
}

/* ── Header ── */
.sidebar-header {
  padding: 16px 14px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 28px;
}
.sidebar-logo {
  width: 28px; height: 28px;
  background: var(--cta);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 700; font-size: 13px;
  flex-shrink: 0;
}
.sidebar-brand-text {
  font-size: 14px; font-weight: 600; color: var(--text-inverse);
  letter-spacing: -0.01em;
}

/* Project selector — only visible when expanded */
.sidebar-project-selector {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-sm);
  padding: 7px 10px;
  color: var(--text-inverse);
  font-size: 12px; font-weight: 500;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  transition: background 0.15s, opacity 0.18s, max-height 0.28s;
  width: 100%;
  overflow: hidden;
  max-height: 0; opacity: 0; margin-top: 0; padding: 0 10px;
}
.sidebar:hover .sidebar-project-selector,
.sidebar.open .sidebar-project-selector {
  max-height: 40px; opacity: 1; margin-top: 10px; padding: 7px 10px;
}
.sidebar-project-selector:hover { background: rgba(255,255,255,0.1); }
.sidebar-project-selector .chevron { color: var(--text-sidebar); font-size: 10px; }

/* ── Navigation ── */
.sidebar-nav {
  padding: 10px 8px;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar-nav::-webkit-scrollbar { width: 0; }

.sidebar-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  color: var(--text-sidebar);
  font-size: 13px; font-weight: 450;
  cursor: pointer;
  transition: all 0.12s;
  position: relative;
  white-space: nowrap;
}
.sidebar-nav-item:hover { background: var(--sidebar-hover); color: var(--text-sidebar-active); }
.sidebar-nav-item.active { background: var(--sidebar-active); color: var(--text-sidebar-active); font-weight: 500; }
.sidebar-nav-item .nav-icon {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.7; flex-shrink: 0;
}
.sidebar-nav-item.active .nav-icon { opacity: 1; }
.sidebar-nav-item .nav-badge {
  margin-left: auto; background: var(--awaiting); color: white;
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
  min-width: 18px; text-align: center;
}
/* Badge position when collapsed — overlay on icon */
.sidebar .sidebar-nav-item .nav-badge {
  position: absolute; top: 2px; left: 22px;
  margin-left: 0; padding: 0 4px; min-width: 14px; font-size: 9px;
}
.sidebar:hover .sidebar-nav-item .nav-badge,
.sidebar.open .sidebar-nav-item .nav-badge {
  position: static; margin-left: auto; padding: 1px 6px; min-width: 18px; font-size: 10px;
}

.sidebar-separator { height: 1px; background: rgba(255,255,255,0.06); margin: 6px 8px; }

/* ── Chapter groups (visible only when expanded) ── */
.sidebar-chapter-group {
  margin-top: 2px;
  max-height: 0; opacity: 0; overflow: hidden;
  transition: max-height 0.28s ease, opacity 0.18s ease;
}
.sidebar:hover .sidebar-chapter-group,
.sidebar.open .sidebar-chapter-group {
  max-height: 500px; opacity: 1;
}
.sidebar-chapter-label {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
  transition: color 0.12s;
}
.sidebar-chapter-label:hover { color: rgba(255,255,255,0.55); }
.sidebar-chapter-label .ch-arrow { font-size: 8px; transition: transform 0.2s; }
.sidebar-chapter-label .ch-arrow.open { transform: rotate(90deg); }

.sidebar-step-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 26px;
  font-size: 12px; color: var(--text-sidebar);
  cursor: pointer; border-radius: var(--r-sm);
  transition: all 0.12s;
}
.sidebar-step-item:hover { background: var(--sidebar-hover); color: var(--text-sidebar-active); }
.sidebar-step-item.active { color: var(--text-sidebar-active); font-weight: 500; }

.step-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.step-dot.committed { background: var(--committed); }
.step-dot.awaiting_input { background: var(--awaiting); box-shadow: 0 0 0 3px rgba(234,88,12,0.2); }
.step-dot.upcoming_locked { background: var(--upcoming); }

/* ── Footer ── */
.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.sidebar-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.sidebar-user-info {
  flex: 1; overflow: hidden;
}
.sidebar-user-name { font-size: 12px; color: var(--text-inverse); font-weight: 500; white-space: nowrap; }
.sidebar-user-role { font-size: 10.5px; color: var(--text-sidebar); white-space: nowrap; }

/* ═══════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════ */
.main-content {
  margin-left: var(--sidebar-collapsed-w);
  flex: 1;
  min-height: 100vh;
  transition: margin-left 0.28s cubic-bezier(0.4, 0, 0.2, 1);
}

.page-container {
  max-width: 820px;
  margin: 0 auto;
  padding: var(--sp-3xl) var(--sp-xl);
}

.page-header {
  margin-bottom: var(--sp-lg);
}
.page-title {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}
.page-subtitle {
  font-size: 0.87rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ═══════════════════════════════════════════
   OVERVIEW — 4-Layer Homepage (Premium Polish)
   A: Context Strip  B: Hero  C: Quick Actions  D: Tabs
   ═══════════════════════════════════════════ */
.overview-page {
  margin: 0;
  padding: 28px 36px 16px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}
.overview-page::-webkit-scrollbar { width: 4px; }
.overview-page::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.ov-header {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 16px; margin-bottom: 22px; flex-shrink: 0;
}
.ov-header .page-title { font-size: 1.3rem; letter-spacing: -0.02em; }
.ov-header .page-subtitle { color: var(--text-secondary); }

/* ════ A. CONTEXT STRIP ════ */
.context-strip {
  flex-shrink: 0;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-light);
}

/* Phase timeline */
.phase-timeline {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 12px;
  padding: 8px 6px;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--r-md);
}
.phase-node {
  flex: 1; display: flex; align-items: center; gap: 9px;
  padding: 7px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
}
.phase-node:hover { background: var(--surface-hover); }
.phase-node-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2.5px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.22s;
}

/* Completed: grounded, resolved, confident */
.phase-node.completed .phase-node-dot {
  border-color: var(--committed);
  background: var(--committed);
}
.phase-node.completed .phase-node-dot::after {
  content: '✓'; font-size: 8px; color: white; font-weight: 700;
}
.phase-node.completed .phase-node-label {
  color: var(--text-primary); font-weight: 500;
}
.phase-node.completed .phase-node-sub {
  color: var(--text-secondary);
}
.phase-node.completed .phase-node-state {
  color: var(--committed);
}

/* Active: dominant, unmistakable */
.phase-node.current {
  background: rgba(43,24,120,0.07);
  border: 1px solid rgba(43,24,120,0.15);
  border-radius: var(--r-sm);
  margin: -1px 0;
  box-shadow: inset 0 0 0 1px rgba(43,24,120,0.06);
}
.phase-node.current .phase-node-dot {
  width: 15px; height: 15px;
  border-width: 3px;
  border-color: var(--accent);
  background: var(--accent);
  box-shadow: 0 0 0 4px rgba(43,24,120,0.12);
  animation: phase-pulse 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}
@keyframes phase-pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(43,24,120,0.12); }
  50% { box-shadow: 0 0 0 7px rgba(43,24,120,0.06); }
}
.phase-node.current .phase-node-dot::after {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: white;
}
.phase-node.current .phase-node-label {
  color: var(--accent); font-weight: 700;
}
.phase-node.current .phase-node-sub {
  color: var(--accent);
}
.phase-node.current .phase-node-state {
  color: var(--accent);
}

/* Upcoming: quiet, clearly "not yet" */
.phase-node.upcoming .phase-node-dot {
  border-color: var(--border);
}
.phase-node.upcoming .phase-node-dot::after {
  content: '–'; font-size: 9px; color: var(--text-tertiary); font-weight: 600;
  opacity: 0.5;
}
.phase-node.upcoming .phase-node-label {
  color: var(--text-tertiary); font-weight: 450;
}
.phase-node.upcoming .phase-node-sub {
  color: var(--text-tertiary);
}
.phase-node.upcoming .phase-node-state {
  color: var(--text-tertiary); opacity: 0.6;
}

.phase-node-info { display: flex; flex-direction: column; gap: 0; }
.phase-node-label {
  font-size: 12.5px; font-weight: 600; color: var(--text-tertiary);
  line-height: 1.3;
}
.phase-node-sub {
  font-size: 10px; color: var(--text-tertiary); margin-top: 2px;
}
.phase-node-state {
  font-size: 9px; font-weight: 600; letter-spacing: 0.03em;
  margin-top: 2px;
}
.phase-connector {
  width: 28px; height: 2px; background: var(--border); flex-shrink: 0;
  border-radius: 1px;
  transition: background 0.2s;
  opacity: 0.4;
}
.phase-connector.done { background: var(--committed); opacity: 1; }

/* Narrative line — secondary but readable */
.context-narrative {
  font-size: 13px; color: var(--text-secondary); line-height: 1.55;
  margin-bottom: 6px;
}

/* Team status line — useful context */
.context-team {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; color: var(--text-secondary);
}
.context-team strong { color: var(--text-primary); font-weight: 500; }

/* ════ B. DYNAMIC HERO ════ */
.ov-hero {
  background: var(--hero-tint, var(--surface));
  border: 1px solid color-mix(in srgb, var(--hero-phase, var(--accent)), transparent 82%);
  border-radius: var(--r-lg);
  padding: 28px 32px 22px;
  margin-bottom: 18px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04), 0 6px 20px rgba(0,0,0,0.03);
  transition: box-shadow 0.2s;
}
.ov-hero:hover {
  box-shadow: 0 1px 4px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.04);
}
.ov-hero::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--hero-phase, var(--accent)) 0%, color-mix(in srgb, var(--hero-phase, var(--accent)), transparent 40%) 100%);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  z-index: 1;
}
.ov-hero-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 8px;
}
.ov-hero-title {
  font-size: 22px; font-weight: 700; color: var(--text-primary);
  letter-spacing: -0.025em; line-height: 1.2;
  margin-bottom: 10px;
}
.ov-hero-desc {
  font-size: 13.5px; color: var(--text-secondary); line-height: 1.6;
  max-width: 520px;
  margin-bottom: 18px;
}
.ov-hero-actions {
  display: flex; align-items: center; gap: 10px;
}
.ov-hero-summary {
  font-size: 11px; color: var(--text-tertiary); margin-top: 14px;
  padding-top: 0;
  border-top: none;
  opacity: 0.7;
}
.ov-hero-summary a {
  color: var(--accent); font-weight: 600; cursor: pointer;
  opacity: 1;
}
.ov-hero-summary a:hover { text-decoration: underline; }

/* ════ C. QUICK ACTIONS ════ */
.ov-quick-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
  flex-shrink: 0;
}
.qa-card {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
}
.qa-card:hover {
  border-color: var(--qa-accent, var(--accent));
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transform: translateY(-1px);
}
.qa-card:active {
  transform: translateY(0);
  box-shadow: none;
}
.qa-card-icon {
  width: 38px; height: 38px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: var(--qa-bg, var(--surface-hover));
  color: var(--qa-accent, var(--text-secondary));
  transition: all 0.18s;
}
.qa-card:hover .qa-card-icon {
  background: var(--qa-accent, var(--accent));
  color: white;
  transform: scale(1.04);
}
.qa-card-text { display: flex; flex-direction: column; }
.qa-card-label {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  line-height: 1.3;
  display: flex; align-items: center; gap: 6px;
}
.qa-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  font-size: 10px; font-weight: 700;
  border-radius: 9px;
  line-height: 1;
}
.qa-sub {
  font-size: 10.5px; color: var(--text-tertiary); margin-top: 2px;
  line-height: 1.3;
}

/* ════ D. TABBED CONTENT ════ */
.ov-tabs {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
}
.ov-tab-bar {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  margin-bottom: 0;
}
.ov-tab {
  padding: 10px 20px;
  font-size: 12.5px; font-weight: 500;
  color: var(--text-tertiary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  user-select: none;
}
.ov-tab:hover { color: var(--text-primary); }
.ov-tab.active {
  color: var(--text-primary);
  border-bottom-color: var(--text-primary);
  font-weight: 600;
}
.ov-tab-content {
  flex: 1; min-height: 0;
  padding: 14px 0;
  overflow-y: auto;
}
.ov-tab-content::-webkit-scrollbar { width: 3px; }
.ov-tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Tab: Updates feed — curated project digest */
.update-item {
  display: flex; gap: 10px; align-items: center;
  padding: 7px 8px;
  border-radius: var(--r-sm);
  transition: background 0.12s;
}
.update-item:hover { background: var(--surface-hover); }
.update-icon {
  width: 26px; height: 26px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.update-icon.file { background: var(--accent-light); color: var(--accent); }
.update-icon.status { background: #ECFDF5; color: #059669; }
.update-icon.message { background: #F5F3FF; color: #7C3AED; }
.update-icon svg { width: 13px; height: 13px; }
.update-body { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 8px; }
.update-title {
  font-size: 12.5px; color: var(--text-primary); font-weight: 500;
  line-height: 1.35;
}
.update-sub {
  font-size: 10px; color: var(--text-tertiary); white-space: nowrap; flex-shrink: 0;
}

/* Tab: Files compact */
.tab-file {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 6px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background 0.12s;
}
.tab-file:hover { background: var(--surface-hover); }
.tab-file-icon {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tab-file-icon.pdf { background: #FEE2E2; color: #DC2626; }
.tab-file-icon.img { background: #DBEAFE; color: var(--accent); }
.tab-file-icon.svg { background: #EDE9FE; color: #7C3AED; }
.tab-file-name { font-size: 12.5px; color: var(--text-primary); font-weight: 500; flex: 1; }
.tab-file-meta { font-size: 10px; color: var(--text-tertiary); }

/* Tab: Messages preview */
.tab-msg {
  display: flex; gap: 10px; padding: 10px 6px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background 0.12s;
}
.tab-msg:hover { background: var(--surface-hover); }
.tab-msg-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 10px; font-weight: 700; color: white;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tab-msg-avatar.team { background: var(--accent); }
.tab-msg-avatar.client { background: var(--phase-1); }
.tab-msg-body { flex: 1; min-width: 0; }
.tab-msg-head {
  display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px;
}
.tab-msg-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.tab-msg-time { font-size: 10px; color: var(--text-tertiary); }
.tab-msg-text {
  font-size: 12.5px; color: var(--text-secondary); line-height: 1.4;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.tab-cta {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--accent); font-weight: 500;
  cursor: pointer; margin-top: 10px; padding: 4px 0;
  transition: opacity 0.12s;
}
.tab-cta:hover { text-decoration: underline; }

/* ════ Responsive ════ */
@media (max-width: 1100px) {
  .overview-page { padding: 20px 24px 16px; }
  .ov-hero { padding: 24px 24px; }
  .ov-hero-title { font-size: 20px; }
}
@media (max-width: 768px) {
  .overview-page {
    height: auto; overflow: auto;
    padding: 16px 16px calc(var(--bottomnav-h) + 16px);
  }

  /* Timeline: 2×2 grid, no connectors */
  .phase-timeline {
    flex-wrap: wrap; gap: 4px;
    padding: 6px 5px;
  }
  .phase-connector { display: none; }
  .phase-node {
    flex: 0 0 calc(50% - 4px);
    padding: 7px 8px;
    gap: 7px;
  }
  .phase-node-dot { width: 12px; height: 12px; border-width: 2px; }
  .phase-node.current .phase-node-dot { width: 13px; height: 13px; }
  .phase-node-label { font-size: 11.5px; }
  .phase-node-sub { font-size: 9px; }
  .phase-node-state { font-size: 8px; }

  /* Context narrative + team — tighter */
  .context-narrative { font-size: 12.5px; }
  .context-team { font-size: 11px; flex-wrap: wrap; }
  .context-strip { margin-bottom: 18px; padding-bottom: 12px; }

  /* Hero — compact mobile */
  .ov-hero { padding: 20px 18px 18px; margin-bottom: 14px; }
  .ov-hero::before { height: 3px; }
  .ov-hero-eyebrow { font-size: 9px; margin-bottom: 6px; }
  .ov-hero-title { font-size: 18px; margin-bottom: 8px; }
  .ov-hero-desc { font-size: 13px; margin-bottom: 16px; max-width: 100%; }
  .ov-hero-actions { flex-wrap: wrap; gap: 8px; }
  .ov-hero-actions .btn-primary { font-size: 12.5px !important; padding: 9px 18px !important; }
  .ov-hero-actions .btn-ghost { font-size: 11.5px !important; padding: 7px 12px !important; }
  .ov-hero-summary { margin-top: 12px; font-size: 10.5px; }

  /* Quick actions — 2 col, 3rd full width */
  .ov-quick-actions {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .ov-quick-actions .qa-card:last-child {
    grid-column: 1 / -1;
  }
  .qa-card { padding: 12px 12px; gap: 10px; }
  .qa-card-icon { width: 32px; height: 32px; border-radius: 7px; }
  .qa-card-icon svg { width: 14px; height: 14px; }
  .qa-card-label { font-size: 12px; }
  .qa-sub { font-size: 10px; }
  .qa-count { height: 16px; min-width: 16px; font-size: 9px; padding: 0 4px; }

  /* Tabs — full width, tighter */
  .ov-tab { padding: 9px 14px; font-size: 12px; }
  .ov-tab-content { padding: 10px 0; }

  /* Updates — stack time below title on mobile */
  .update-body { flex-direction: column; align-items: flex-start; gap: 1px; }
  .update-item { padding: 6px 6px; gap: 8px; }
  .update-icon { width: 24px; height: 24px; border-radius: 5px; }
  .update-icon svg { width: 12px; height: 12px; }
  .update-title { font-size: 12px; }
  .update-sub { font-size: 9.5px; }

  /* Files tab — tighter */
  .tab-file { padding: 6px 4px; gap: 8px; }
  .tab-file-icon { width: 24px; height: 24px; }
  .tab-file-name { font-size: 12px; }
  .tab-file-meta { font-size: 9.5px; }

  /* Header */
  .ov-header { flex-direction: column; align-items: start; margin-bottom: 16px; }
  .ov-header .page-title { font-size: 1.15rem; }
  .ov-header .page-subtitle { font-size: 12px; }
}
@media (max-width: 420px) {
  .overview-page { padding: 14px 12px calc(var(--bottomnav-h) + 12px); }
  .phase-node { flex: 0 0 calc(50% - 3px); padding: 6px 6px; gap: 6px; }
  .phase-node-label { font-size: 11px; }
  .ov-hero { padding: 16px 14px 14px; }
  .ov-hero-title { font-size: 16px; margin-bottom: 6px; }
  .ov-hero-desc { font-size: 12.5px; margin-bottom: 14px; }
  .ov-quick-actions { grid-template-columns: 1fr; gap: 6px; }
  .ov-quick-actions .qa-card:last-child { grid-column: auto; }
  .ov-tab { padding: 8px 12px; font-size: 11.5px; }
}

/* ═══════════════════════════════════════════
   A) PROJECT SNAPSHOT (compact metadata)
   ═══════════════════════════════════════════ */
.snapshot {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: var(--sp-xl);
}

.snapshot-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  white-space: nowrap;
}

.snapshot-chip .chip-dot {
  width: 5px; height: 5px; border-radius: 50%;
  flex-shrink: 0;
}
.snapshot-chip .chip-dot.active { background: var(--awaiting); }
.snapshot-chip .chip-dot.info { background: var(--accent); }
.snapshot-chip .chip-dot.time { background: var(--text-tertiary); }

.snapshot-chip strong { font-weight: 600; color: var(--text-primary); }

/* ═══════════════════════════════════════════
   B) NARRATIVE TIMELINE
   ═══════════════════════════════════════════ */
.narrative-block {
  margin-bottom: var(--sp-xl);
}

.narrative-text {
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--text-secondary);
  margin-bottom: 14px;
  max-width: 620px;
}

.chapter-strip {
  display: flex;
  gap: 3px;
  align-items: stretch;
}

.chapter-strip-item {
  flex: 1;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  position: relative;
  min-width: 0;
}
.chapter-strip-item.completed,
.chapter-strip-item.current,
.chapter-strip-item.upcoming {
  /* Phase colors now applied inline */
}

.chapter-strip-item:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}

.strip-icon {
  font-size: 12px;
  margin-bottom: 2px;
  display: block;
}

.strip-label {
  font-size: 10.5px;
  font-weight: 600;
  line-height: 1.3;
  display: block;
}

/* connector between strips */
.chapter-strip-connector {
  width: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.chapter-strip-connector::after {
  content: '';
  width: 8px; height: 1px;
  background: var(--border);
}

/* ═══════════════════════════════════════════
   D) TASKS BRIDGE (compact)
   ═══════════════════════════════════════════ */
.tasks-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-xl);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: all 0.12s;
}
.tasks-row:hover { border-color: var(--accent); background: var(--accent-light); }

.tasks-row-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: #FEF3C7;
  display: flex; align-items: center; justify-content: center;
  color: #B45309; flex-shrink: 0;
}

.tasks-row-content { flex: 1; }
.tasks-row-text { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.tasks-row-sub { font-size: 11.5px; color: var(--text-tertiary); margin-top: 1px; }

.tasks-row-link {
  font-size: 12.5px; font-weight: 600; color: var(--accent);
  white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}

/* Linked tasks in step detail */
.linked-tasks-section { margin-top: 8px; }
.linked-task-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: var(--surface-hover);
  border-radius: var(--r-sm);
  margin-bottom: 5px;
  font-size: 12.5px;
  cursor: pointer;
  transition: background 0.1s;
}
.linked-task-item:hover { background: var(--surface-active); }
.linked-task-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.linked-task-dot.needs-attention { background: var(--awaiting); }
.linked-task-dot.in-progress { background: var(--accent); }
.linked-task-dot.done { background: var(--committed); }

.linked-task-status {
  margin-left: auto;
  font-size: 10.5px; font-weight: 500; color: var(--text-tertiary);
}

/* ═══════════════════════════════════════════
   C) WHAT'S NEW (compact, elevated)
   ═══════════════════════════════════════════ */
.mini-updates {
  margin-bottom: var(--sp-xl);
}

/* ═══════════════════════════════════════════
   OVERVIEW: NEXT CHECKPOINT HERO
   ═══════════════════════════════════════════ */
.hero-checkpoint {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--sp-xl) var(--sp-xl) 22px;
  margin-bottom: var(--sp-xl);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.hero-checkpoint::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--hero-phase, var(--awaiting)), color-mix(in srgb, var(--hero-phase, var(--awaiting)), #F59E0B 40%));
}

.hero-eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--awaiting);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.hero-eyebrow .pulse {
  width: 6px; height: 6px; border-radius: 50%; background: var(--awaiting);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(234,88,12,0.3); }
  50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(234,88,12,0); }
}

.hero-title {
  font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 10px;
}

.hero-narrative {
  font-size: 0.87rem; line-height: 1.6;
  color: var(--text-secondary);
  margin-bottom: 18px;
  max-width: 580px;
}

.hero-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

.btn-primary {
  background: var(--cta);
  color: white;
  padding: 9px 20px;
  border-radius: var(--r-sm);
  font-size: 13.5px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 7px;
  transition: all 0.15s;
  box-shadow: 0 1px 3px rgba(255,135,48,0.25);
}
.btn-primary:hover { background: var(--cta-hover); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(255,135,48,0.3); }

.btn-ghost {
  color: var(--text-secondary);
  padding: 9px 16px;
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.12s;
}
.btn-ghost:hover { background: var(--surface-hover); color: var(--text-primary); }

.hero-meta {
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 6px;
}

/* ═══════════════════════════════════════════
   OVERVIEW: TEAM STATUS
   ═══════════════════════════════════════════ */
.team-status-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px 18px;
  margin-bottom: var(--sp-xl);
  display: flex;
  align-items: flex-start;
  gap: 14px;
  box-shadow: var(--shadow-sm);
}

.team-status-indicator {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--committed-bg);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--committed);
}

.team-status-content { flex: 1; }
.team-status-line {
  font-size: 13.5px;
  color: var(--text-primary);
  font-weight: 500;
}
.team-status-sub {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 3px;
}

/* ═══════════════════════════════════════════
   OVERVIEW: QUICK ACCESS
   ═══════════════════════════════════════════ */
.quick-access {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: var(--sp-xl);
}

.qa-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-sm);
}
.qa-item:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-1px); box-shadow: var(--shadow-md); }

.qa-icon {
  width: 32px; height: 32px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.qa-icon.file { background: var(--accent-light); color: var(--accent); }
.qa-icon.msg { background: #F0FDF4; color: var(--committed); }
.qa-icon.cal { background: #FEF3C7; color: #B45309; }
.qa-icon.ask { background: #F3E8FF; color: #7C3AED; }

.qa-label { font-size: 12.5px; font-weight: 500; color: var(--text-primary); }
.qa-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }

/* ═══════════════════════════════════════════
   OVERVIEW: JOURNEY PREVIEW
   ═══════════════════════════════════════════ */
.section-label {
  font-size: 12px; font-weight: 600; letter-spacing: 0.03em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-label .view-all {
  font-size: 12px; font-weight: 500; color: var(--accent);
  text-transform: none; letter-spacing: 0; cursor: pointer;
}
.section-label .view-all:hover { text-decoration: underline; }

.journey-chapter {
  margin-bottom: 6px;
}
.journey-chapter-head {
  font-size: 11.5px; font-weight: 600; color: var(--text-secondary);
  padding: 6px 0;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
  user-select: none;
}
.journey-chapter-head:hover { color: var(--text-primary); }
.journey-chapter-head .j-arrow { font-size: 8px; transition: transform 0.2s; color: var(--text-tertiary); }
.journey-chapter-head .j-arrow.open { transform: rotate(90deg); }

.journey-step {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0 8px 18px;
  position: relative;
  cursor: pointer;
  transition: all 0.1s;
  border-radius: var(--r-sm);
}
.journey-step:hover { background: var(--surface-hover); }
/* connector line */
.journey-step::before {
  content: '';
  position: absolute; left: 21px; top: -4px; bottom: -4px;
  width: 1px; background: var(--border-light);
}
.journey-step:first-child::before { top: 50%; }
.journey-step:last-child::before { bottom: 50%; }

.journey-step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; position: relative; z-index: 1;
}
.journey-step-dot.committed { background: var(--committed); }
.journey-step-dot.awaiting_input { background: var(--awaiting); box-shadow: 0 0 0 3px rgba(234,88,12,0.15); }
.journey-step-dot.upcoming_locked { background: var(--upcoming); }

.journey-step-title { font-size: 13px; font-weight: 450; flex: 1; }
.journey-step-title.committed { color: var(--text-tertiary); }
.journey-step-title.awaiting_input { color: var(--text-primary); font-weight: 500; }
.journey-step-title.upcoming_locked { color: var(--text-tertiary); }

.journey-step-status {
  font-size: 10.5px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; white-space: nowrap;
}
.journey-step-status.committed { background: var(--committed-bg); color: var(--committed); }
.journey-step-status.awaiting_input { background: var(--awaiting-bg); color: var(--awaiting); }
.journey-step-status.upcoming_locked { background: var(--upcoming-bg); color: var(--upcoming); }

/* ═══════════════════════════════════════════
   OVERVIEW: WHAT'S NEW
   ═══════════════════════════════════════════ */
.update-item {
  display: flex; gap: 12px; padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
}
.update-item:last-child { border-bottom: none; }

.update-dot-col { padding-top: 4px; }
.update-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
}

.update-content { flex: 1; }
.update-text { font-size: 13px; color: var(--text-primary); line-height: 1.5; }
.update-time { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

/* ═══════════════════════════════════════════
   STEPS PAGE
   ═══════════════════════════════════════════ */
.steps-chapter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  margin-bottom: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.steps-chapter-head {
  padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; user-select: none;
  transition: background 0.12s;
}
.steps-chapter-head:hover { background: var(--surface-hover); }

.steps-ch-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--surface-active);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--text-secondary);
  flex-shrink: 0;
}
.steps-ch-title { font-size: 14px; font-weight: 600; flex: 1; }
.steps-ch-progress { font-size: 11.5px; color: var(--text-tertiary); font-weight: 500; }
.steps-ch-arrow { font-size: 10px; color: var(--text-tertiary); transition: transform 0.2s; }
.steps-ch-arrow.open { transform: rotate(180deg); }

.steps-list { padding: 0 18px 14px; }

.step-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: all 0.1s;
  border-radius: var(--r-sm);
}
.step-row:last-child { border-bottom: none; }
.step-row:hover { background: var(--surface-hover); padding-left: 6px; padding-right: 6px; margin-left: -6px; margin-right: -6px; }

.step-row-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

// ═══════════════════════════════════════════
// HELPERS (extended)
// ═══════════════════════════════════════════
function getNextCheckpoint() {
  for (const ch of project.chapters) {
    for (const s of ch.steps) {
      if (s.status === "awaiting_input") return { step: s, chapter: ch };
    }
  }
  return null;
}
// Alias per spec
const getNextActionableStep = getNextCheckpoint;

// Priority 3: next step that team is preparing (upcoming_locked)
// In production: derived from ClickUp task status = IN PROGRESS / INTERNAL REVIEW
// where the task is tagged client_visible but not yet CLIENT REVIEW
function getNextUpcomingStep() {
  for (const ch of project.chapters) {
    for (const s of ch.steps) {
      if (s.status === "upcoming_locked") return { step: s, chapter: ch };
    }
  }
  return null;
}

function getCurrentChapter() {
  const next = getNextCheckpoint();
  return next ? next.chapter : project.chapters[project.chapters.length - 1];
}

function isChapterCompleted(ch) {
  return ch.steps.every(s => s.status === "committed");
}

function getChapterStatus(ch) {
  if (isChapterCompleted(ch)) return 'completed';
  const currentCh = getCurrentChapter();
  if (currentCh && ch.id === currentCh.id) return 'current';
  return 'upcoming';
}

function getChapterProgress(ch) {
  const done = ch.steps.filter(s => s.status === "committed").length;
  return `${done}/${ch.steps.length}`;
}

function getLastUpdate() {
  return project.updates.length ? project.updates[0] : null;
}

function getTasksForStep(stepId) {
  return project.tasks.filter(t => t.stepId === stepId);
}

function taskStatusLabel(status) {
  const map = { 'needs-attention': 'Offen', 'in-progress': 'In Arbeit', 'done': 'Erledigt' };
  return map[status] || status;
}

function statusLabel(status) {
  const map = { committed: "Bestätigt", awaiting_input: "Wartet auf Sie", upcoming_locked: "Bald" };
  return map[status] || status;
}

function statusLabelEN(status) {
  const map = { committed: "Committed", awaiting_input: "Awaiting input", upcoming_locked: "Upcoming" };
  return map[status] || status;
}

// Phase color system
const PHASE_COLORS = {
  1: { main: '#7C3AED', light: '#F5F3FF', mid: '#EDE9FE', text: '#6D28D9' },
  2: { main: '#2563EB', light: '#EFF6FF', mid: '#DBEAFE', text: '#1D4ED8' },
  3: { main: '#D97706', light: '#FFFBEB', mid: '#FEF3C7', text: '#B45309' },
  4: { main: '#059669', light: '#ECFDF5', mid: '#D1FAE5', text: '#047857' },
};

function getPhaseColor(ch) {
  return PHASE_COLORS[ch.order] || PHASE_COLORS[1];
}

// B) Generate narrative text dynamically
function generateNarrative() {
  const completedChapters = project.chapters.filter(isChapterCompleted);
  const currentCh = getCurrentChapter();
  const next = getNextCheckpoint();

  let achieved = '';
  if (completedChapters.length > 0) {
    const names = completedChapters.map(c => c.title).join(' und ');
    achieved = `Wir haben die Phase „${names}" abgeschlossen. `;
  }

  let current = '';
  if (next) {
    current = `Aktuell: ${next.step.title}. `;
  }

  let upcoming = '';
  const curIdx = project.chapters.findIndex(c => c.id === currentCh?.id);
  if (curIdx >= 0 && curIdx < project.chapters.length - 1) {
    upcoming = `Danach starten wir mit: ${project.chapters[curIdx + 1].title}.`;
  } else if (curIdx === project.chapters.length - 1) {
    upcoming = 'Wir nähern uns dem Abschluss.';
  }

  // A nicer narrative phrasing
  if (completedChapters.length === 0 && next) {
    return `Wir haben Ihre Anforderungen gesammelt und den Projektbrief bestätigt. Als Nächstes legen wir den Scope fest — danach starten wir mit der Struktur Ihrer Website.`;
  }

  return achieved + current + upcoming;
}

function renderOverview() {
  const next = getNextCheckpoint();
  const currentChapter = getCurrentChapter();
  const curPC = currentChapter ? getPhaseColor(currentChapter) : PHASE_COLORS[1];
  const heroPC = next ? getPhaseColor(next.chapter) : curPC;

  // ═══ A. CONTEXT STRIP ═══

  // Phase timeline
  let timelineHTML = '';
  for (let i = 0; i < project.chapters.length; i++) {
    const ch = project.chapters[i];
    const pc = getPhaseColor(ch);
    const chSt = getChapterStatus(ch);
    const progress = getChapterProgress(ch);

    if (i > 0) {
      const prevSt = getChapterStatus(project.chapters[i-1]);
      timelineHTML += `<div class="phase-connector ${prevSt === 'completed' ? 'done' : ''}"></div>`;
    }

    const stateLabel = chSt === 'completed' ? 'Abgeschlossen' : chSt === 'current' ? 'Aktuell' : '';

    timelineHTML += `
      <div class="phase-node ${chSt}" onclick="state.timelineActiveChapter='${ch.id}';setState({page:'overview'});">
        <div class="phase-node-dot" style="${chSt !== 'upcoming' ? 'border-color:'+pc.main+';' : ''}${chSt==='completed' ? 'background:'+pc.main+';' : ''}"></div>
        <div class="phase-node-info">
          <div class="phase-node-label">${ch.title}</div>
          <div class="phase-node-sub">${stateLabel || progress}</div>
        </div>
      </div>`;
  }

  // Narrative
  const narrativeText = currentChapter ? (currentChapter.narrative || '') + ' ' + (currentChapter.nextNarrative || '') : '';

  // Team status
  const teamLine = `<span style="display:inline-flex;color:var(--phase-3);margin-right:2px;">${ICONS.zap}</span> Team arbeitet an: <strong>${project.teamWorkingOn.task}</strong> · Fertig: ${project.teamWorkingOn.eta}`;

  const contextStripHTML = `
    <div class="context-strip animate-in">
      <div class="phase-timeline">${timelineHTML}</div>
      <div class="context-narrative">${narrativeText}</div>
      <div class="context-team">${teamLine}</div>
    </div>`;

  // ═══ B. DYNAMIC HERO ═══
  // ═══ B. DYNAMIC HERO ═══
  // Hero Priority Cascade (scalable to N clients via ClickUp):
  //
  // Priority 1: awaiting_input step exists
  //   ClickUp source: task status = CLIENT REVIEW + custom field "Visible in portal" = true
  //   Hero: "Nächster Schritt" + primary CTA "Öffnen & prüfen"
  //
  // Priority 2: tasks needing client attention exist (no awaiting step)
  //   ClickUp source: tasks in CLIENT REVIEW that are sub-tasks or linked tasks
  //   Hero: "Jetzt wichtig" + "N Aufgaben warten auf Sie"
  //
  // Priority 3: next step is being prepared by team (no client action needed)
  //   ClickUp source: task status = IN PROGRESS / INTERNAL REVIEW, client_visible = true
  //   Hero: "In Vorbereitung" + context text, no primary CTA
  //
  // Priority 4: everything complete, nothing in pipeline
  //   ClickUp source: all visible tasks = COMPLETE / APPROVED
  //   Hero: "Alles erledigt"
  //
  // All states are fully derivable from ClickUp task statuses.
  // No manual portal configuration needed per client.

  let heroHTML = '';
  const tasksList = project.tasks || [];
  const needsAttention = tasksList.filter(t => t.status === 'needs-attention');
  const upcoming = getNextUpcomingStep();

  if (next) {
    // Priority 1: Step awaiting client input
    heroHTML = `
      <div class="ov-hero animate-in delay-1" style="--hero-phase:${heroPC.main};--hero-tint:${heroPC.light};">
        <div class="ov-hero-eyebrow" style="color:${heroPC.text};">
          <span class="pulse" style="background:${heroPC.main};width:7px;height:7px;border-radius:50%;"></span>
          Nächster Schritt
        </div>
        <div class="ov-hero-title">${next.step.title}</div>
        <div class="ov-hero-desc">${next.step.description}</div>
        <div class="ov-hero-actions">
          <button class="btn-primary" onclick="navigateToStep('${next.step.id}')" style="font-size:13px;padding:9px 20px;">Öffnen & prüfen ${ICONS.arrow}</button>
          <button class="btn-ghost" onclick="setState({page:'messages'})" style="font-size:12px;padding:8px 14px;">${ICONS.messages} Nachricht senden</button>
        </div>
        ${needsAttention.length > 0 ? `<div class="ov-hero-summary">${needsAttention.length} Aufgabe${needsAttention.length > 1 ? 'n' : ''} warte${needsAttention.length > 1 ? 'n' : 't'} auf Sie · <a onclick="setState({page:'tasks'})">Anzeigen</a></div>` : ''}
      </div>`;
  } else if (needsAttention.length > 0) {
    // Priority 2: Tasks need attention (no major step pending)
    heroHTML = `
      <div class="ov-hero animate-in delay-1" style="--hero-phase:var(--awaiting);--hero-tint:#FFFBEB;">
        <div class="ov-hero-eyebrow" style="color:var(--awaiting);">
          <span class="pulse" style="background:var(--awaiting);width:7px;height:7px;border-radius:50%;"></span>
          Jetzt wichtig
        </div>
        <div class="ov-hero-title">${needsAttention.length} Aufgabe${needsAttention.length > 1 ? 'n' : ''} warte${needsAttention.length > 1 ? 'n' : 't'} auf Sie</div>
        <div class="ov-hero-desc">Es gibt offene Aufgaben, die Ihre Rückmeldung brauchen.</div>
        <div class="ov-hero-actions">
          <button class="btn-primary" onclick="setState({page:'tasks'})" style="font-size:13px;padding:9px 20px;">Aufgaben öffnen ${ICONS.arrow}</button>
        </div>
      </div>`;
  } else if (upcoming) {
    // Priority 3: Team is preparing next step — client sees progress
    const upPC = getPhaseColor(upcoming.chapter);
    heroHTML = `
      <div class="ov-hero animate-in delay-1" style="--hero-phase:${upPC.main};--hero-tint:${upPC.light};">
        <div class="ov-hero-eyebrow" style="color:${upPC.text};">
          ${ICONS.zap} In Vorbereitung
        </div>
        <div class="ov-hero-title">${upcoming.step.title}</div>
        <div class="ov-hero-desc">${upcoming.step.description} Wir melden uns, sobald dieser Schritt zur Prüfung bereit ist.</div>
        <div class="ov-hero-actions">
          <button class="btn-ghost" onclick="setState({page:'messages'})" style="font-size:12px;padding:8px 14px;">${ICONS.messages} Nachricht senden</button>
        </div>
      </div>`;
  } else {
    // Priority 4: Everything complete
    heroHTML = `
      <div class="ov-hero animate-in delay-1" style="--hero-phase:${curPC.main};--hero-tint:${curPC.light};">
        <div class="ov-hero-eyebrow" style="color:var(--committed);">
          ${ICONS.check} Alles erledigt
        </div>
        <div class="ov-hero-title">Kein Handlungsbedarf</div>
        <div class="ov-hero-desc">Aktuell warten keine Schritte auf Ihre Rückmeldung. Wir arbeiten im Hintergrund weiter und melden uns, sobald der nächste Schritt bereit ist.</div>
      </div>`;
  }

  // ═══ C. QUICK ACTIONS ═══
  const tasksCount = (project.tasks || []).filter(t => t.status === 'needs-attention').length;
  const msgsCount = 2; // In production: from unread count

  const quickActionsHTML = `
    <div class="ov-quick-actions animate-in delay-2">
      <div class="qa-card" style="--qa-accent:#D97706;--qa-bg:#FFFBEB;" onclick="setState({page:'tasks'})">
        <div class="qa-card-icon">${ICONS.tasks}</div>
        <div class="qa-card-text">
          <div class="qa-card-label">Aufgaben öffnen ${tasksCount > 0 ? `<span class="qa-count" style="background:#FFFBEB;color:#B45309;">${tasksCount}</span>` : ''}</div>
          <div class="qa-sub">Offene Punkte ansehen</div>
        </div>
      </div>
      <div class="qa-card" style="--qa-accent:#7C3AED;--qa-bg:#F5F3FF;" onclick="setState({page:'messages'})">
        <div class="qa-card-icon">${ICONS.messages}</div>
        <div class="qa-card-text">
          <div class="qa-card-label">Nachricht senden ${msgsCount > 0 ? `<span class="qa-count" style="background:#F5F3FF;color:#6D28D9;">${msgsCount}</span>` : ''}</div>
          <div class="qa-sub">Direkt ans Team</div>
        </div>
      </div>
      <div class="qa-card" style="--qa-accent:#2B1878;--qa-bg:#EEEAFF;" onclick="setState({page:'files'})">
        <div class="qa-card-icon">${ICONS.upload}</div>
        <div class="qa-card-text">
          <div class="qa-card-label">Datei hochladen</div>
          <div class="qa-sub">Neue Unterlagen senden</div>
        </div>
      </div>
    </div>`;

  // ═══ D. TABBED CONTENT ═══
  const activeTab = state.overviewTab || 'updates';

  // Tab: Updates — curated digest with type icons
  const updateIcon = (type) => {
    if (type === 'file') return `<div class="update-icon file">${ICONS.upload}</div>`;
    if (type === 'status') return `<div class="update-icon status">${ICONS.check}</div>`;
    return `<div class="update-icon message">${ICONS.messages}</div>`;
  };
  const updatesHTML = project.updates.slice(0, 4).map(u => `
    <div class="update-item">
      ${updateIcon(u.type)}
      <div class="update-body">
        <div class="update-title">${u.text}</div>
        <div class="update-sub">${u.time}</div>
      </div>
    </div>`).join('');

  // Tab: Files
  const recentFiles = [];
  for (const ch of project.chapters) {
    for (const s of ch.steps) {
      for (const f of s.files) {
        recentFiles.push(f);
      }
    }
  }
  recentFiles.sort((a, b) => b.date.localeCompare(a.date));
  function tabFileIcon(type) {
    if (type === 'pdf') return { icon: ICONS.pdf, cls: 'pdf' };
    if (type === 'img' || type === 'jpg' || type === 'png') return { icon: ICONS.img, cls: 'img' };
    if (type === 'svg') return { icon: ICONS.svg, cls: 'svg' };
    return { icon: ICONS.doc, cls: 'pdf' };
  }
  const filesTabHTML = recentFiles.slice(0, 5).map(f => {
    const fi = tabFileIcon(f.type);
    return `
      <div class="tab-file">
        <div class="tab-file-icon ${fi.cls}">${fi.icon}</div>
        <span class="tab-file-name">${f.name}</span>
        <span class="tab-file-meta">${f.size} · ${f.date}</span>
      </div>`;
  }).join('') + `<div class="tab-cta" onclick="setState({page:'files'})">Alle Dateien öffnen ${ICONS.arrow}</div>`;

  // Tab: Messages
  const allMessages = [];
  for (const ch of project.chapters) {
    for (const s of ch.steps) {
      for (const m of s.messages) {
        allMessages.push({ ...m, step: s.title, stepId: s.id });
      }
    }
  }
  allMessages.reverse();
  const msgsTabHTML = allMessages.slice(0, 3).map(m => `
    <div class="tab-msg" onclick="navigateToStep('${m.stepId}')">
      <div class="tab-msg-avatar ${m.role}">${m.author.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
      <div class="tab-msg-body">
        <div class="tab-msg-head">
          <span class="tab-msg-name">${m.author}</span>
          <span class="tab-msg-time">${m.time}</span>
        </div>
        <div class="tab-msg-text">${m.text}</div>
      </div>
    </div>
  `).join('') + `<div class="tab-cta" onclick="setState({page:'messages'})">Zum Chat ${ICONS.arrow}</div>`;

  // Assemble tabs
  let tabContentHTML = '';
  if (activeTab === 'updates') tabContentHTML = updatesHTML;
  else if (activeTab === 'files') tabContentHTML = filesTabHTML;
  else if (activeTab === 'messages') tabContentHTML = msgsTabHTML;

  const tabsHTML = `
    <div class="ov-tabs animate-in delay-3">
      <div class="ov-tab-bar">
        <div class="ov-tab ${activeTab === 'updates' ? 'active' : ''}" onclick="state.overviewTab='updates';render();">Updates</div>
        <div class="ov-tab ${activeTab === 'files' ? 'active' : ''}" onclick="state.overviewTab='files';render();">Dateien</div>
        <div class="ov-tab ${activeTab === 'messages' ? 'active' : ''}" onclick="state.overviewTab='messages';render();">Nachrichten</div>
      </div>
      <div class="ov-tab-content">${tabContentHTML}</div>
    </div>`;

  return `
    <div class="overview-page">
      <div class="ov-header animate-in">
        <div>
          <div class="page-title">${project.name}</div>
          <div class="page-subtitle">${project.type} · ${project.startDate} — ${project.targetDate}</div>
        </div>
      </div>
      ${contextStripHTML}
      ${heroHTML}
      ${quickActionsHTML}
      ${tabsHTML}
    </div>`;
}

function getNextChapterName(nextCheckpoint) {
  const idx = project.chapters.findIndex(c => c.id === nextCheckpoint.chapter.id);
  if (idx < project.chapters.length - 1) return project.chapters[idx + 1].title;
  return 'Abschluss';
}

// STEPS PAGE
// ═══════════════════════════════════════════
function renderSteps() {
  let chaptersHTML = '';
  for (const ch of project.chapters) {
    const isOpen = state.expandedChapters[ch.id] || false;
    const progress = getChapterProgress(ch);

    let stepsHTML = '';
    if (isOpen) {
      stepsHTML = `<div class="steps-list">${ch.steps.map(s => `
        <div class="step-row" onclick="navigateToStep('${s.id}')">
          <div class="step-row-dot ${s.status}"></div>
          <span class="step-row-title">${s.title}</span>
          <span class="journey-step-status ${s.status}">${statusLabel(s.status)}</span>
          ${s.updatedAt ? `<span class="step-row-date">${s.updatedAt}</span>` : ''}
        </div>
      `).join('')}</div>`;
    }

    const spc = getPhaseColor(ch);

    chaptersHTML += `
      <div class="steps-chapter-card animate-in" style="border-left:3px solid ${spc.main};">
        <div class="steps-chapter-head" onclick="toggleSidebarChapter('${ch.id}')">
          <div class="steps-ch-num" style="background:${spc.light};color:${spc.text};">${ch.order}</div>
          <span class="steps-ch-title" style="color:${spc.text};">${ch.title}</span>
          <span class="steps-ch-progress">${progress}</span>
          <span class="steps-ch-arrow ${isOpen ? 'open' : ''}">▼</span>
        </div>
        ${stepsHTML}
      </div>`;
  }

  return `
    <div class="page-container">
      <div class="detail-back animate-in" onclick="setState({page:'overview'})">${ICONS.back} Übersicht</div>
      <div class="page-header animate-in">
        <div class="page-title">Schritte</div>
        <div class="page-subtitle">Alle Checkpoints Ihres Projekts</div>
      </div>
      ${chaptersHTML}
    </div>`;
}

function renderTasks() {
  const needsAttention = project.tasks.filter(t => t.status === 'needs-attention');
  const inProgress = project.tasks.filter(t => t.status === 'in-progress');

  const renderTaskGroup = (title, tasks, emptyMsg) => {
    if (!tasks.length) return `<p style="font-size:13px; color:var(--text-tertiary); margin-bottom: 16px;">${emptyMsg}</p>`;
    return `
      <div class="section-label" style="margin-top: 20px;">${title}</div>
      ${tasks.map(t => `
        <div class="linked-task-item" style="margin-bottom: 6px;">
          <div class="linked-task-dot ${t.status}"></div>
          <span style="flex:1;">${t.title}</span>
          <span class="linked-task-status">${taskStatusLabel(t.status)}</span>
        </div>
      `).join('')}`;
  };

  return `
    <div class="page-container">
      <div class="detail-back animate-in" onclick="setState({page:'overview'})">${ICONS.back} Übersicht</div>
      <div class="page-header animate-in">
        <div class="page-title">Aufgaben</div>
        <div class="page-subtitle">${project.tasksSummary.total} Aufgaben insgesamt · ${project.tasksSummary.needsAttention} brauchen Ihre Rückmeldung</div>
      </div>
      <div class="animate-in delay-1" style="background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding: var(--sp-xl);">
        ${renderTaskGroup('Wartet auf Sie', needsAttention, 'Keine offenen Aufgaben.')}
        ${renderTaskGroup('In Arbeit', inProgress, '')}
        <div style="margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border-light); font-size: 12.5px; color: var(--text-tertiary);">
          Aufgaben werden aus Ihrem Projektmanagement-System synchronisiert.
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// STEP DETAIL (extended with linked tasks)
// ═══════════════════════════════════════════
function renderStepDetail() {
  let step = null, chapter = null;
  for (const ch of project.chapters) {
    const found = ch.steps.find(s => s.id === state.detailStepId);
    if (found) { step = found; chapter = ch; break; }
  }
  if (!step) return '<div class="page-container"><p>Schritt nicht gefunden.</p></div>';

  const tab = state.detailTab;
  let tabContent = '';

  if (tab === 'overview') {
    const whyOpen = state.expandedSections.whyItMatters;
    const whatOpen = state.expandedSections.whatBecomesFixed;
    const tasksOpen = state.expandedSections.linkedTasks;

    let actionBar = '';
    if (step.status === 'awaiting_input') {
      actionBar = `
        <div class="detail-action-bar animate-in delay-1">
          <div style="flex:1;">
            <div style="font-size:13px; font-weight:500; color:var(--text-primary);">Bereit für Ihre Prüfung</div>
            <div style="font-size:12px; color:var(--text-secondary); margin-top:2px;">Bitte prüfen Sie das Dokument und geben Sie Ihr Feedback.</div>
          </div>
          <button class="btn-primary">Freigeben</button>
          <button class="btn-ghost">Änderungen anfragen</button>
        </div>`;
    }

    // D) Linked tasks section
    const linkedTasks = getTasksForStep(step.id);
    let linkedTasksHTML = '';
    if (linkedTasks.length > 0) {
      const tasksListHTML = tasksOpen ? `
        <div class="linked-tasks-section">
          ${linkedTasks.map(t => `
            <div class="linked-task-item">
              <div class="linked-task-dot ${t.status}"></div>
              <span style="flex:1;">${t.title}</span>
              <span class="linked-task-status">${taskStatusLabel(t.status)}</span>
            </div>
          `).join('')}
        </div>` : '';

      linkedTasksHTML = `
        <div class="detail-section animate-in delay-5">
          <div class="detail-section-title" onclick="toggleSection('linkedTasks')">
            <span class="toggle-arrow ${tasksOpen ? 'open' : ''}">▸</span>
            Verknüpfte Aufgaben (${linkedTasks.length})
          </div>
          ${tasksListHTML}
        </div>`;
    }

    tabContent = `
      ${actionBar}
      <div class="detail-section animate-in delay-2">
        <div class="detail-section-title">Was ist das?</div>
        <div class="detail-section-body">${step.description}</div>
      </div>

      <div class="detail-section animate-in delay-3">
        <div class="detail-section-title" onclick="toggleSection('whyItMatters')">
          <span class="toggle-arrow ${whyOpen ? 'open' : ''}">▸</span>
          Warum ist das wichtig?
        </div>
        ${whyOpen ? `<div class="detail-section-body">${step.whyItMatters}</div>` : ''}
      </div>

      <div class="detail-section animate-in delay-4">
        <div class="detail-section-title" onclick="toggleSection('whatBecomesFixed')">
          <span class="toggle-arrow ${whatOpen ? 'open' : ''}">▸</span>
          Was wird damit festgelegt?
        </div>
        ${whatOpen ? `<div class="detail-section-body">${step.whatBecomesFixed}</div>` : ''}
      </div>

      ${linkedTasksHTML}`;
  }

  if (tab === 'files') {
    const filesHTML = step.files.length ? step.files.map(f => `
      <div class="file-item">
        <div class="file-icon">${ICONS.pdf}</div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-meta">${f.size} · ${f.date}</div>
        </div>
      </div>
    `).join('') : '<p style="font-size:13px; color:var(--text-tertiary);">Noch keine Dateien für diesen Schritt.</p>';

    tabContent = `
      <div class="animate-in delay-1">
        ${filesHTML}
        <div class="dropzone">
          ${ICONS.upload}<br>
          Dateien hierher ziehen oder <strong>klicken</strong>
        </div>
      </div>`;
  }

  if (tab === 'discussion') {
    const msgsHTML = step.messages.length ? step.messages.map(m => `
      <div class="chat-bubble">
        <div class="chat-avatar ${m.role}">${m.author.charAt(0)}</div>
        <div class="chat-body">
          <div class="chat-name">${m.author} <span>${m.time}</span></div>
          <div class="chat-text">${m.text}</div>
        </div>
      </div>
    `).join('') : '<p style="font-size:13px; color:var(--text-tertiary); margin-bottom: 16px;">Noch keine Nachrichten zu diesem Schritt.</p>';

    tabContent = `
      <div class="animate-in delay-1">
        ${msgsHTML}
        <div class="chat-input-row">
          <input class="chat-input" placeholder="Nachricht schreiben…" />
          <button class="chat-send">${ICONS.send}</button>
        </div>
      </div>`;
  }

  const dpc = getPhaseColor(chapter);

  return `
    <div class="page-container">
      <div class="detail-back animate-in" onclick="setState({page:'overview'})">${ICONS.back} Übersicht</div>
      <div class="detail-header animate-in">
        <div class="detail-chapter-label" style="color:${dpc.text};"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dpc.main};margin-right:6px;"></span>${chapter.title}</div>
        <div class="detail-title-row">
          <div class="detail-title">${step.title}</div>
          <span class="status-pill ${step.status}">${statusLabel(step.status)}</span>
        </div>
      </div>

      <div class="detail-tabs animate-in delay-1">
        <div class="detail-tab ${tab === 'overview' ? 'active' : ''}" onclick="setState({detailTab:'overview'})">Übersicht</div>
        <div class="detail-tab ${tab === 'files' ? 'active' : ''}" onclick="setState({detailTab:'files'})">Dateien ${step.files.length ? '(' + step.files.length + ')' : ''}</div>
        <div class="detail-tab ${tab === 'discussion' ? 'active' : ''}" onclick="setState({detailTab:'discussion'})">Diskussion ${step.messages.length ? '(' + step.messages.length + ')' : ''}</div>
      </div>

      ${tabContent}
    </div>`;
}

// ── Files Page ──
function renderFiles() {
  // Collect all files with chapter/step metadata
  const allFiles = [];
  for (const ch of project.chapters) {
    for (const s of ch.steps) {
      for (const f of s.files) {
        allFiles.push({ ...f, stepTitle: s.title, chapterId: ch.id, chapterTitle: ch.title, chapterOrder: ch.order });
      }
    }
  }

  // Count files per chapter
  const chapterCounts = {};
  project.chapters.forEach(ch => { chapterCounts[ch.id] = 0; });
  allFiles.forEach(f => { chapterCounts[f.chapterId] = (chapterCounts[f.chapterId] || 0) + 1; });

  // Filter by chapter
  const activeFilter = state.filesFilter;
  let filtered = activeFilter === 'all' ? allFiles : allFiles.filter(f => f.chapterId === activeFilter);

  // Filter by type
  const typeFilter = state.filesTypeFilter;
  if (typeFilter !== 'all') {
    filtered = filtered.filter(f => {
      const t = f.type || 'other';
      if (typeFilter === 'img') return ['img','jpg','png','svg'].includes(t);
      if (typeFilter === 'pdf') return t === 'pdf';
      if (typeFilter === 'doc') return ['doc','docx'].includes(t);
      return true;
    });
  }

  // Count by type (from chapter-filtered set, not type-filtered)
  const chapterFiltered = activeFilter === 'all' ? allFiles : allFiles.filter(f => f.chapterId === activeFilter);
  const typeCounts = { img: 0, pdf: 0, doc: 0 };
  chapterFiltered.forEach(f => {
    const t = f.type || 'other';
    if (t === 'img' || t === 'jpg' || t === 'png' || t === 'svg') typeCounts.img++;
    else if (t === 'pdf') typeCounts.pdf++;
    else typeCounts.doc++;
  });

  // File icon helper
  function fileIcon(type) {
    if (type === 'pdf') return { icon: ICONS.pdf, cls: 'pdf' };
    if (type === 'img' || type === 'jpg' || type === 'png') return { icon: ICONS.img, cls: 'img' };
    if (type === 'svg') return { icon: ICONS.svg, cls: 'svg' };
    if (type === 'doc' || type === 'docx') return { icon: ICONS.doc, cls: 'doc' };
    return { icon: ICONS.clip, cls: 'other' };
  }

  // Active chapter label
  const activeLabel = activeFilter === 'all' ? 'Alle Phasen' : project.chapters.find(c => c.id === activeFilter)?.title || '';

  // Folders with phase colors
  const foldersHTML = project.chapters.map(ch => {
    const fpc = getPhaseColor(ch);
    const isActive = activeFilter === ch.id;
    return `
    <div class="files-folder ${isActive ? 'active' : ''}" onclick="toggleFilesFilter('${ch.id}')" style="${isActive ? `background:${fpc.light};border-color:${fpc.main};` : `border-color:${fpc.mid};`}">
      <div class="files-folder-icon" style="color:${fpc.main};">${ICONS.folder}</div>
      <div class="files-folder-info">
        <div class="files-folder-name" style="color:${isActive ? fpc.text : 'var(--text-primary)'};">${ch.title}</div>
        <div class="files-folder-count">${chapterCounts[ch.id]} Dateien</div>
      </div>
    </div>`;
  }).join('');

  // Type tabs
  const typeTabsHTML = `
    <div class="files-type-tabs">
      <div class="files-type-tab ${typeFilter === 'all' ? 'active' : ''}" onclick="setState({filesTypeFilter:'all'})">
        Alle <span class="files-type-tab-count">${chapterFiltered.length}</span>
      </div>
      <div class="files-type-tab ${typeFilter === 'img' ? 'active' : ''}" onclick="setState({filesTypeFilter:'img'})">
        <span class="files-type-tab-icon">${ICONS.img}</span> Bilder <span class="files-type-tab-count">${typeCounts.img}</span>
      </div>
      <div class="files-type-tab ${typeFilter === 'pdf' ? 'active' : ''}" onclick="setState({filesTypeFilter:'pdf'})">
        <span class="files-type-tab-icon">${ICONS.pdf}</span> Dokumente <span class="files-type-tab-count">${typeCounts.pdf}</span>
      </div>
    </div>`;

  // Table rows with phase-colored chips
  const rowsHTML = filtered.length ? filtered.map(f => {
    const fi = fileIcon(f.type);
    const rowPC = PHASE_COLORS[f.chapterOrder] || PHASE_COLORS[1];
    return `
      <div class="files-table-row">
        <div class="files-table-file">
          <div class="files-table-file-icon ${fi.cls}">${fi.icon}</div>
          <div class="files-table-file-info">
            <div class="files-table-file-name">${f.name}</div>
            <div class="files-table-file-author">${f.author || '—'}</div>
          </div>
        </div>
        <div><span class="files-table-phase" style="background:${rowPC.light};color:${rowPC.text};border:1px solid ${rowPC.mid};">${f.chapterTitle}</span></div>
        <div class="files-table-size">${f.size}</div>
        <div class="files-table-date">${f.date}</div>
        <div class="files-table-actions">
          <button class="files-table-action-btn" title="Ansehen">${ICONS.eye}</button>
          <button class="files-table-action-btn" title="Download">${ICONS.download}</button>
        </div>
      </div>`;
  }).join('') : '<div style="padding: 24px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px;">Keine Dateien in dieser Ansicht.</div>';

  return `
    <div class="page-container">
      <div class="detail-back animate-in" onclick="setState({page:'overview'})">${ICONS.back} Übersicht</div>
      <div class="page-header animate-in">
        <div class="page-title">Projektdateien</div>
        <div class="page-subtitle">Alle Dateien nach Projektphase geordnet</div>
      </div>

      <div class="animate-in delay-1">
        <div class="section-label">Ordner <span style="text-transform:none; letter-spacing:0; font-weight:400;">Phase anklicken zum Filtern</span></div>
        <div class="files-folders">${foldersHTML}</div>
      </div>

      <div class="files-table-wrap animate-in delay-2">
        <div class="files-table-header">
          <div class="files-table-title">Alle Dateien <span>${filtered.length} Dateien · ${activeLabel}</span></div>
          <button class="files-upload-btn">${ICONS.upload} Hochladen</button>
        </div>

        <div class="files-dropzone-inline">
          ${ICONS.upload} Dateien hierher ziehen · PNG, JPG, PDF, DOCX bis 50 MB
        </div>

        ${typeTabsHTML}

        <div class="files-table-row-head">
          <div>Datei</div>
          <div>Phase</div>
          <div>Größe</div>
          <div>Hochgeladen</div>
          <div></div>
        </div>

        ${rowsHTML}
      </div>
    </div>`;
}

// ── Messages Page ──
function renderMessages() {
  const allMessages = [];
  for (const ch of project.chapters) {
    for (const s of ch.steps) {
      for (const m of s.messages) {
        allMessages.push({ ...m, step: s.title });
      }
    }
  }

  allMessages.sort((a, b) => b.time.localeCompare(a.time));

  const msgsHTML = allMessages.map(m => `
    <div class="chat-bubble">
      <div class="chat-avatar ${m.role}">${m.author.charAt(0)}</div>
      <div class="chat-body">
        <div class="chat-name">${m.author} <span>${m.time} · ${m.step}</span></div>
        <div class="chat-text">${m.text}</div>
      </div>
    </div>
  `).join('');

  return `
    <div class="page-container">
      <div class="detail-back animate-in" onclick="setState({page:'overview'})">${ICONS.back} Übersicht</div>
      <div class="page-header animate-in">
        <div class="page-title">Nachrichten</div>
        <div class="page-subtitle">Alle Projektdiskussionen</div>
      </div>
      <div class="messages-container animate-in delay-1">
        <div class="messages-header-bar">${ICONS.msgCircle} Projekt-Chat</div>
        <div class="messages-body">
          ${msgsHTML || '<p style="font-size:13px; color:var(--text-tertiary);">Noch keine Nachrichten.</p>'}
        </div>
        <div style="padding: 14px 20px; border-top: 1px solid var(--border);">
          <div class="chat-input-row" style="margin-top:0; padding-top:0; border-top:none;">
            <input class="chat-input" placeholder="Nachricht schreiben…" />
            <button class="chat-send">${ICONS.send}</button>
          </div>
        </div>
      </div>
    </div>`;
}

// ── Help Page ──
function renderHelp() {
  return `
    <div class="page-container">
      <div class="detail-back animate-in" onclick="setState({page:'overview'})">${ICONS.back} Übersicht</div>
      <div class="page-header animate-in">
        <div class="page-title">Hilfe</div>
        <div class="page-subtitle">Häufige Fragen und Anleitungen</div>
      </div>
      <div class="animate-in delay-1" style="background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding: var(--sp-xl);">
        <p style="font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 16px;">
          <strong>Was sind Checkpoints?</strong><br>
          Checkpoints sind die wichtigsten Meilensteine Ihres Projekts. Bei jedem Checkpoint prüfen und bestätigen Sie eine Lieferung — das sorgt dafür, dass wir immer auf dem gleichen Stand sind.
        </p>
        <p style="font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 16px;">
          <strong>Was bedeutet „Wartet auf Sie"?</strong><br>
          Ein Schritt, der Ihre Aufmerksamkeit braucht. Öffnen Sie ihn, prüfen Sie die Unterlagen und geben Sie Feedback oder Ihre Freigabe.
        </p>
        <p style="font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 16px;">
          <strong>Was sind Aufgaben?</strong><br>
          Aufgaben sind kleinere To-dos, die zu einem Checkpoint gehören können — z.B. „Logo liefern" oder „Texte freigeben". Sie finden diese unter Aufgaben oder direkt im Checkpoint.
        </p>
        <p style="font-size: 14px; color: var(--text-secondary); line-height: 1.7;">
          <strong>Wie erreiche ich das Team?</strong><br>
          Nutzen Sie den Nachrichten-Bereich oder schreiben Sie direkt im Diskussions-Tab eines Checkpoints.
        </p>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════
function render() {
  let pageContent = '';
  switch (state.page) {
    case 'overview': pageContent = renderOverview(); break;
    case 'steps': pageContent = renderOverview(); break; // steps merged into overview
    case 'tasks': pageContent = renderTasks(); break;
    case 'files': pageContent = renderFiles(); break;
    case 'messages': pageContent = renderMessages(); break;
    case 'help': pageContent = renderHelp(); break;
    case 'step-detail': pageContent = renderStepDetail(); break;
  }

  document.getElementById('app').innerHTML = `
    ${renderSidebar()}
    <div class="sidebar-overlay ${state.sidebarOpen ? 'show' : ''}" onclick="setState({sidebarOpen:false})"></div>
    ${renderMobileHeader()}
    <div class="main-content">
      ${pageContent}
    </div>
    ${renderBottomNav()}
  `;
}

// ═══════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════
function navigateToStep(stepId) {
  setState({ page: 'step-detail', detailStepId: stepId, detailTab: 'overview', sidebarOpen: false, expandedSections: { whyItMatters: false, whatBecomesFixed: false, linkedTasks: false } });
}

function navigateToChapter(chId) {
  // Expand the chapter on overview
  state.expandedChapters[chId] = true;
  setState({ page: 'overview' });
}

function toggleFilesFilter(chId) {
  setState({
    filesFilter: state.filesFilter === chId ? 'all' : chId,
    filesTypeFilter: 'all'
  });
}

function toggleSidebarChapter(chId) {
  state.expandedChapters[chId] = !state.expandedChapters[chId];
  render();
}

function toggleJourneyChapter(chId) {
  state.expandedChapters[chId] = !state.expandedChapters[chId];
  render();
}

function toggleSection(key) {
  state.expandedSections[key] = !state.expandedSections[key];
  render();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
</script>
</body>
</html>
