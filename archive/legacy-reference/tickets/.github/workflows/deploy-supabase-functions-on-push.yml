name: Auto Deploy Supabase Edge Functions (changed only)

on:
  push:
    branches: [ "main" ]
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Detect changed functions
        id: changed
        shell: bash
        run: |
          set -e

          # GitHub gives "before" and "after" commit SHAs for push events
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          echo "Before: $BEFORE"
          echo "After:  $AFTER"

          # In rare cases (first push, force-push) BEFORE can be all zeros
          if [[ "$BEFORE" =~ ^0{40}$ ]]; then
            echo "This looks like an initial/force push. Deploying all functions as fallback."
            ls -1 supabase/functions 2>/dev/null | tr '\n' ' ' > /tmp/functions.txt || true
          else
            # Get list of function folder names affected by changed files
            git diff --name-only "$BEFORE" "$AFTER" \
              | grep '^supabase/functions/' \
              | awk -F/ '{print $3}' \
              | sort -u \
              > /tmp/functions.txt || true
          fi

          echo "Changed functions:"
          cat /tmp/functions.txt || true

          # Output as a single line for next step
          CHANGED="$(cat /tmp/functions.txt | tr '\n' ' ' | xargs || true)"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Deploy changed functions
        if: steps.changed.outputs.changed != ''
        shell: bash
        run: |
          set -e
          for fn in ${{ steps.changed.outputs.changed }}; do
            # Skip folders that are not actual functions (if present)
            if [ "$fn" = "_shared" ] || [ "$fn" = "" ]; then
              continue
            fi

            if [ -d "supabase/functions/$fn" ]; then
              echo "Deploying function: $fn"
              supabase functions deploy "$fn" --no-verify-jwt
            else
              echo "Skipping: $fn (folder not found)"
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Nothing to deploy
        if: steps.changed.outputs.changed == ''
        run: echo "No changes detected in supabase/functions/* — skipping deploy."
