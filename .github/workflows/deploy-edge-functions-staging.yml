name: Deploy Edge Functions (Staging)

on:
  push:
    branches: [staging]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloud Supabase Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Detect changed functions
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_all=true" >> $GITHUB_OUTPUT
          else
            PREV="${{ github.event.before }}"
            if [ "$PREV" = "0000000000000000000000000000000000000000" ]; then
              echo "deploy_all=true" >> $GITHUB_OUTPUT
            else
              CHANGED=$(git diff --name-only "$PREV" HEAD -- supabase/functions/ | \
                grep -oE 'supabase/functions/[^/]+' | sort -u | \
                grep -v '_shared\|^supabase/functions/main$' || true)
              SHARED=$(git diff --name-only "$PREV" HEAD -- supabase/functions/_shared/ supabase/functions/main/ | head -1)
              if [ -n "$SHARED" ]; then
                echo "deploy_all=true" >> $GITHUB_OUTPUT
              else
                echo "deploy_all=false" >> $GITHUB_OUTPUT
                echo "changed_functions=$(echo "$CHANGED" | xargs -I{} basename {} | tr '\n' ' ')" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Link to staging project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.STAGING_PROJECT_REF }}

      - name: Deploy all functions (shared changed or manual trigger)
        if: steps.changes.outputs.deploy_all == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy --no-verify-jwt
          echo "### Deployed all Edge Functions to staging ✅" >> $GITHUB_STEP_SUMMARY

      - name: Deploy changed functions only
        if: steps.changes.outputs.deploy_all == 'false' && steps.changes.outputs.changed_functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in ${{ steps.changes.outputs.changed_functions }}; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" --no-verify-jwt
          done
          echo "### Deployed to staging: ${{ steps.changes.outputs.changed_functions }} ✅" >> $GITHUB_STEP_SUMMARY
