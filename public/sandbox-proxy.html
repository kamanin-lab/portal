<!-- TODO(production): Move this file to a separate origin (e.g. sandbox.kamanin.at)
     before multi-client rollout. Same-origin sandbox provides no real isolation;
     currently tolerable only because the upstream MCP server is operator-controlled. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MCP Sandbox Proxy</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>
<script>
(function () {
  'use strict';

  // Notify the host that the sandbox proxy is ready
  window.parent.postMessage(
    { jsonrpc: '2.0', method: 'ui/notifications/sandbox-proxy-ready', params: {} },
    '*'
  );

  // Listen for the resource-ready message from the host
  window.addEventListener('message', function onMessage(event) {
    if (!event.data || event.data.method !== 'ui/notifications/sandbox-resource-ready') return;

    var params = event.data.params || {};
    var html = params.html;
    if (!html) return;

    // Remove this listener — we only need the first resource-ready
    window.removeEventListener('message', onMessage);

    // Create the inner iframe with the resource HTML
    var inner = document.createElement('iframe');
    inner.style.width = '100%';
    inner.style.height = '100%';
    inner.style.border = 'none';

    // Apply sandbox attribute if provided, otherwise use a secure default
    var sandbox = params.sandbox || 'allow-scripts allow-forms';
    inner.setAttribute('sandbox', sandbox);

    document.body.appendChild(inner);
    inner.srcdoc = html;

    // Relay messages from inner iframe to host (parent)
    window.addEventListener('message', function relay(e) {
      if (e.source === inner.contentWindow) {
        // Forward inner -> host
        window.parent.postMessage(e.data, '*');
      } else if (e.source === window.parent) {
        // Forward host -> inner
        if (inner.contentWindow) {
          inner.contentWindow.postMessage(e.data, '*');
        }
      }
    });
  });
})();
</script>
</body>
</html>
